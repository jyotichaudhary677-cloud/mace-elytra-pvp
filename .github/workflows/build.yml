name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build jar
        run: |
          mkdir -p build/libs
          jar cf build/libs/mace-pvp-mod.jar -C src .

      - name: Upload jar
        uses: actions/upload-artifact@v3
        with:
          name: mod-jar
          path
